            options: [
                "Phân kỳ vì tử số tiến ra vô tận.",
                "Hội tụ vì ở vô cực, hàm số hành xử tương đương với hàm cấu trúc $\\frac{1}{2x^2}$ có $p = 2 > 1$.",
                "Hội tụ về giá trị 0.",
                "Phân kỳ vì mẫu số có đa thức quá phức tạp."
            ],
            correct: 1,
            explain: "Học tư duy cấu trúc vĩ mô của DUYMT: Khi $x$ tiến ra xa rìa vũ trụ ($+\\infty$), những số hạng bậc thấp không còn ý nghĩa. Hàm số sẽ bị chi phối hoàn toàn bởi tỷ số của hai bậc cao nhất: $\\frac{x^2}{2x^4} = \\frac{1}{2x^2}$. Vì số mũ $p = 2 > 1$, tích phân gốc chắc chắn hội tụ.",
            trick: "Mẹo liếc mắt nhìn nhanh bậc vĩ mô: Lấy bậc cao nhất của Mẫu trừ đi bậc cao nhất của Tử: $4 - 2 = 2$. Vì kết quả hiệu số bậc lớn hơn 1, kết luận ngay lập tức là HỘI TỤ."

        {
            type: "kho",
            question: "Tính giá trị của tích phân suy rộng có chứa logarit: $I = \\int_1^{+\\infty} \\frac{\\ln x}{x^2} dx$",
            options: [
                "$I = +\\infty$ (Phân kỳ)",
                "$I = 2$",
                "$I = 1$",
                "$I = 1/2$"
            ],
            correct: 2,
            explain: "Tích phân từng phần: Đặt $u = \\ln x, dv = \\frac{dx}{x^2} \\Rightarrow du = \\frac{dx}{x}, v = -\\frac{1}{x}$. Ta có $I = [-\\frac{\\ln x}{x}]_1^{+\\infty} + \\int_1^{+\\infty} \\frac{1}{x^2} dx$. Giới hạn $\\lim_{t\\rightarrow+\\infty} \\frac{\\ln t}{t} = 0$ theo L'Hospital. Tích phân còn lại bằng $\\frac{1}{2-1} = 1$. Tổng kết quả bằng $1$.",

        },
        {
            type: "kho",
            question: "Tính tích phân suy rộng đặc biệt sau: $I = \\int_{-\\infty}^{+\\infty} \\frac{1}{x^2 + 1} dx$",
            options: [
                "$I = 0$ (Do tính chất đối xứng của hàm chẵn)",
                "$I = \\pi$",
                "$I = \\pi/2$",
                "$I = +\\infty$ (Phân kỳ do kéo dài cả hai đầu)"
            ],
            correct: 1,
            explain: "Tích phân suy rộng kéo dài ra cả hai phía vô cực biên. Ta tách ra thành hai vùng qua điểm gốc: $I = \\int_{-\\infty}^0 + \\int_0^{+\\infty}$. Mỗi bên đối xứng đều đóng góp một lượng diện tích bằng $\\lim_{t\\rightarrow+\\infty} \\arctan(t) = \\frac{\\pi}{2}$. Do đó tổng diện tích toàn không gian dưới đường cong bằng $\\frac{\\pi}{2} + \\frac{\\pi}{2} = \\pi$.",
            trick: "Mẹo DUYMT: Hàm hình chuông Cauchy quét sạch từ âm vô cực đến dương vô cực phủ kín diện tích sàn bằng đúng chu vi một nửa vòng tròn đơn vị ($\\pi$)."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const quizContainer = document.getElementById('quiz-container');
    const progressBar = document.getElementById('progress');
    const resultScreen = document.getElementById('result-screen');
    const scoreText = document.getElementById('score-text');
    const feedbackText = document.getElementById('feedback-text');

    // Hàm khởi tạo giao diện câu hỏi
    function initQuiz() {
        quizContainer.innerHTML = '';
        quizData.forEach((q, index) => {
            let tagText = "";
            let tagClass = "";
            if(q.type === "lythuyet") { tagText = "Lý thuyết lõi"; tagClass = "tag-lythuyet"; }
            else if(q.type === "de") { tagText = "Bài tập: Dễ"; tagClass = "tag-de"; }
            else if(q.type === "trungbinh") { tagText = "Bài tập: Trung bình"; tagClass = "tag-trungbinh"; }
            else { tagText = "Bài tập: Khó"; tagClass = "tag-kho"; }

            const quizBox = document.createElement('div');
            quizBox.className = `quiz-box ${index === 0 ? 'active' : ''}`;
            quizBox.id = `q-${index}`;

            quizBox.innerHTML = `
                <div class="question-tag ${tagClass}">${tagText} - Câu ${index + 1}/20</div>
                <div class="question-text">${q.question}</div>
                <div class="options-container" id="options-${index}">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(${index}, ${i})">${String.fromCharCode(65 + i)}. ${opt}</button>
                    `).join('')}
                </div>
                <div class="explanation-box" id="explain-${index}">
                    <div class="explanation-title" id="explain-title-${index}"></div>
                    <div style="font-size: 15px;">${q.explain}</div>
                    <div class="mẹo-box">
                        <strong>💡 Mẹo nhìn cấu trúc DUYMT:</strong> ${q.trick}
                    </div>
                    <button class="nav-btn clearfix" onclick="nextQuestion()">${index === quizData.length - 1 ? 'Xem kết quả bài học' : 'Bước sang câu tiếp theo 👉'}</button>
                    <div style="clear:both;"></div>
                </div>
            `;
            quizContainer.appendChild(quizBox);
        });
        
        // Gọi MathJax dịch trang lần đầu tiên
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
        updateProgressBar();
    }

    // Hàm kiểm tra đáp án khi người dùng bấm chọn
    function checkAnswer(qIdx, selectedIdx) {
        const currentQuestion = quizData[qIdx];
        const optionsContainer = document.getElementById(`options-${qIdx}`);
        const buttons = optionsContainer.getElementsByClassName('option-btn');
        const explainBox = document.getElementById(`explain-${qIdx}`);
        const explainTitle = document.getElementById(`explain-title-${qIdx}`);

        // Khóa tất cả các nút bấm trong câu này
        for (let btn of buttons) {
            btn.disabled = true;
        }

        if (selectedIdx === currentQuestion.correct) {
            buttons[selectedIdx].classList.add('correct');
            explainBox.classList.add('correct-style');
            explainTitle.innerHTML = "🎉 HOÀN TOÀN CHÍNH XÁC!";
            explainTitle.style.color = "var(--success-color)";
            score++;
        } else {
            buttons[selectedIdx].classList.add('wrong');
            buttons[currentQuestion.correct].classList.add('correct'); // Hiển thị đáp án đúng để đối chiếu
            explainBox.classList.add('wrong-style');
            explainTitle.innerHTML = "❌ CHƯA ĐÚNG RỒI! HÃY GIẢI NÉN CẤU TRÚC:";
            explainTitle.style.color = "var(--second-color)";
        }

        explainBox.style.display = "block";
        
        // Yêu cầu MathJax cập nhật và vẽ lại công thức trong hộp lời giải vừa hiện ra
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    }

    // Hàm chuyển câu tiếp theo
    function nextQuestion() {
        const currentBox = document.getElementById(`q-${currentQuestionIndex}`);
        currentBox.classList.remove('active');

        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
            const nextBox = document.getElementById(`q-${currentQuestionIndex}`);
            nextBox.classList.add('active');
            
            // Yêu cầu MathJax dịch câu hỏi mới
            if (window.MathJax && window.MathJax.typeset) {
                window.MathJax.typeset();
            }
            updateProgressBar();
        } else {
            showResult();
        }
    }

    // Cập nhật thanh tiến trình hành trình học tập
    function updateProgressBar() {
        const percent = ((currentQuestionIndex) / quizData.length) * 100;
        progressBar.style.width = `${percent}%`;
    }

    // Hiển thị kết quả tổng quan
    function showResult() {
        progressBar.style.width = "100%";
        quizContainer.style.display = "none";
        resultScreen.style.display = "block";
        scoreText.innerText = `${score}/${quizData.length}`;

        let feedback = "";
        const performanceRatio = score / quizData.length;

        if(performanceRatio >= 0.9) {
            feedback = "Tuyệt vời! Bạn có tư duy cấu trúc cực kỳ nhạy bén, đã thấu suốt bản chất và phá vỡ thành công vỏ bọc công thức khô khan theo đúng tinh thần sư phạm DUYMT!";
        } else if(performanceRatio >= 0.65) {
            feedback = "Khá tốt! Bạn đã nắm giữ được các ẩn dụ nền tảng và mẹo nhận diện vĩ mô. Hãy đọc kỹ lại phần giải thích ở những câu làm sai để đạt độ chín muồi nhé.";
        } else {
            feedback = "Bạn mới chỉ chạm vào chiếc vỏ cơ bắp bên ngoài của công thức toán. Hãy làm lại bài test này, tập trung đọc sâu các phần 'Mẹo nhìn cấu trúc' để giải phóng tư duy trực giác.";
        }
        feedbackText.innerText = feedback;
    }

    // Chạy ứng dụng khi trang web tải xong
    window.onload = initQuiz;
</script>
